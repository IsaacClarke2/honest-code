# To enable CI: move this file to .github/workflows/ci.yml
# (needs a token with `workflow` scope, or do it via the GitHub web UI).
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tools
        run: pip install pytest ruff
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
